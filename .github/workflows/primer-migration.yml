name: Primer Migration Guard

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  validate-primer-migration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check Primer migration patterns
        run: npm run check:primer-migration

      - name: Build
        run: npm run build
